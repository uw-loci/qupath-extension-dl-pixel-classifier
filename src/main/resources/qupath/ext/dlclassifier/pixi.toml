[workspace]
channels = ["conda-forge", "pytorch"]
# Note: osx-64 (Intel Mac) removed -- pixi panics trying to cross-resolve
# git-based PyPI dependencies for osx-64 when running on Windows/ARM Mac.
# Intel Macs are not a supported target for this extension.
platforms = ["linux-64", "osx-arm64", "win-64"]

# CUDA hint: tells pixi that CUDA 12 is available on the host.
# macOS ignores this (no NVIDIA support). On Linux/Windows it steers
# the resolver to the CUDA variant of PyTorch.
[system-requirements]
cuda = "12"

[dependencies]
python = "3.11.*"
pip = ">=23.0"
appose = ">=0.10.1"
numpy = ">=1.24.0,<2.0"
pillow = ">=10.0.0"
scikit-image = ">=0.21.0"
tifffile = ">=2023.7.0"
imagecodecs = ">=2023.7.0"
pydantic = ">=2.0.0"

# PyTorch (base dependency for all platforms)
pytorch = ">=2.1.0"
torchvision = ">=0.16.0"

# CUDA GPU support: pytorch-gpu steers the resolver to the CUDA variant.
# Only exists for Linux and Windows (macOS has no NVIDIA GPU support).
[target.linux-64.dependencies]
pytorch-gpu = ">=2.1.0"

[target.win-64.dependencies]
pytorch-gpu = ">=2.1.0"

[pypi-dependencies]
segmentation-models-pytorch = ">=0.3.3"
albumentations = ">=1.3.0"
timm = ">=1.0.0"
ttach = ">=0.0.3"
muvit = ">=0.1.0"
x-transformers = ">=1.0.0"
einops = ">=0.7.0"

# ONNX (optional, for exported models)
onnx = ">=1.15.0"
onnxruntime = ">=1.16.0"

# dlclassifier-server is installed separately via pip after the pixi
# environment is built (see ApposeService.java). Pixi's PyPI resolver
# panics on git-based subdirectory dependencies, so this is handled
# outside pixi to avoid the resolver entirely.
