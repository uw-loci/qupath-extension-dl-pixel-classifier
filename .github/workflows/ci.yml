name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew build
        env:
          DISPLAY: ':99'

      - name: Build and test (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew build

  screenshot-check:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    # Advisory only: documentation-screenshot staleness must NOT fail the run. A hard-failing
    # doc-freshness gate stays chronically red on accumulated figure drift, which makes a red CI
    # uninformative and masks real build/test breaks. continue-on-error keeps the staleness
    # report visible while letting overall CI status mean "the build actually broke".
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed to diff each screenshot's source from its commit

      - name: Check documentation screenshots freshness
        run: bash tools/check-doc-images.sh --ci
